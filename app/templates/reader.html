<!DOCTYPE html>
<html lang="bg">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{{ book.title }} — Bookworm</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Source+Serif+4:opsz,wght@8..60,300;8..60,400;8..60,600&display=swap');

  :root {
    --bg: #f5f0e8;
    --bg2: #ede7d9;
    --surface: #fff9f0;
    --border: #d4c9b0;
    --text: #2c2416;
    --text2: #6b5d45;
    --accent: #8b4513;
    --accent2: #a0522d;
    --shadow: rgba(44,36,22,0.12);
    --font-size: 1.1rem;
  }
  [data-theme="dark"] {
    --bg: #1a1510;
    --bg2: #221d14;
    --surface: #2a2218;
    --border: #3d3425;
    --text: #e8dcc8;
    --text2: #a89070;
    --accent: #c4783a;
    --accent2: #d4884a;
    --shadow: rgba(0,0,0,0.4);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Source Serif 4', Georgia, serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  /* Top bar */
  .topbar {
    background: var(--surface);
    border-bottom: 1.5px solid var(--border);
    padding: 0.6rem 1rem;
    display: flex;
    align-items: center;
    gap: 0.8rem;
    position: sticky;
    top: 0;
    z-index: 20;
    box-shadow: 0 2px 6px var(--shadow);
  }
  .back-btn {
    font-family: 'Source Serif 4', serif;
    font-size: 0.85rem;
    color: var(--text2);
    text-decoration: none;
    border: 1.5px solid var(--border);
    padding: 0.3rem 0.7rem;
    border-radius: 3px;
    white-space: nowrap;
    flex-shrink: 0;
  }
  .back-btn:hover { color: var(--accent); border-color: var(--accent); }
  .book-title-bar {
    font-family: 'Playfair Display', serif;
    font-size: 0.95rem;
    font-weight: 700;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    flex: 1;
  }
  .chapter-bar {
    font-size: 0.75rem;
    color: var(--text2);
    font-style: italic;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    max-width: 160px;
  }
  .theme-btn {
    font-size: 1.1rem;
    padding: 0.3rem 0.5rem;
    border: 1.5px solid var(--border);
    background: transparent;
    border-radius: 3px;
    cursor: pointer;
    flex-shrink: 0;
  }

  /* Progress bar */
  .progress-track {
    height: 3px;
    background: var(--bg2);
    position: sticky;
    top: 44px;
    z-index: 19;
  }
  .progress-fill {
    height: 100%;
    background: var(--accent);
    transition: width 0.4s ease;
  }

  /* Main content area */
  .reader-wrap {
    flex: 1;
    display: flex;
    flex-direction: column;
    max-width: 700px;
    width: 100%;
    margin: 0 auto;
    padding: 1.5rem 1.2rem 7rem;
  }

  .para-meta {
    font-size: 0.72rem;
    color: var(--text2);
    text-transform: uppercase;
    letter-spacing: 0.08em;
    margin-bottom: 1.2rem;
  }

  .paragraph-box {
    background: var(--surface);
    border: 1.5px solid var(--border);
    border-radius: 4px;
    padding: 1.5rem 1.8rem;
    font-size: var(--font-size);
    line-height: 1.85;
    box-shadow: 2px 2px 0 var(--border);
    min-height: 120px;
    position: relative;
    transition: opacity 0.2s;
  }
  .paragraph-box.loading { opacity: 0.4; }

  /* Next paragraph preview */
  .next-preview {
    margin-top: 1rem;
    padding: 0.8rem 1.2rem;
    background: var(--bg2);
    border-left: 3px solid var(--border);
    font-size: 0.85rem;
    color: var(--text2);
    font-style: italic;
    line-height: 1.5;
    border-radius: 0 3px 3px 0;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }

  /* Controls */
  .controls-bar {
    position: fixed;
    bottom: 0; left: 0; right: 0;
    background: var(--surface);
    border-top: 1.5px solid var(--border);
    padding: 0.7rem 1rem;
    box-shadow: 0 -2px 10px var(--shadow);
    z-index: 30;
  }
  .controls-main {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 0.5rem;
    max-width: 500px;
    margin: 0 auto 0.5rem;
  }

  .ctrl-btn {
    font-family: 'Source Serif 4', serif;
    font-size: 1.1rem;
    padding: 0.55rem 0.9rem;
    border: 1.5px solid var(--border);
    background: var(--surface);
    color: var(--text);
    border-radius: 3px;
    cursor: pointer;
    transition: all 0.1s;
    min-width: 44px;
    text-align: center;
  }
  .ctrl-btn:hover { border-color: var(--accent); color: var(--accent); }
  .ctrl-btn:active { transform: scale(0.96); }
  .ctrl-btn:disabled { opacity: 0.35; cursor: default; }

  .ctrl-btn.play-pause {
    font-size: 1.4rem;
    padding: 0.55rem 1.3rem;
    background: var(--accent);
    color: #fff9f0;
    border-color: var(--accent);
    flex: 0 0 auto;
  }
  .ctrl-btn.play-pause:hover { background: var(--accent2); border-color: var(--accent2); color: #fff; }

  /* Settings row */
  .controls-settings {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 1.2rem;
    max-width: 500px;
    margin: 0 auto;
    flex-wrap: wrap;
  }
  .setting-group {
    display: flex;
    align-items: center;
    gap: 0.4rem;
    font-size: 0.78rem;
    color: var(--text2);
  }
  .setting-group label { white-space: nowrap; }
  .setting-group input[type=range] {
    width: 80px;
    accent-color: var(--accent);
  }
  .setting-group select {
    font-family: 'Source Serif 4', serif;
    font-size: 0.78rem;
    background: var(--bg);
    color: var(--text);
    border: 1px solid var(--border);
    border-radius: 3px;
    padding: 0.2rem 0.4rem;
  }
  .speed-val { font-weight: 600; color: var(--accent); min-width: 28px; }

  /* Font size control */
  .font-btns { display: flex; gap: 0.2rem; }
  .font-btns button {
    padding: 0.15rem 0.4rem;
    border: 1px solid var(--border);
    background: var(--bg);
    color: var(--text);
    border-radius: 3px;
    cursor: pointer;
    font-family: serif;
  }

  /* Status */
  .status-dot {
    display: inline-block;
    width: 7px; height: 7px;
    border-radius: 50%;
    background: var(--text2);
    margin-right: 4px;
    vertical-align: middle;
  }
  .status-dot.playing { background: #4a9a5a; animation: pulse 1s ease-in-out infinite; }
  .status-dot.loading { background: var(--accent); animation: pulse 0.5s ease-in-out infinite; }
  @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.4; } }

  /* Jump to para */
  .jump-group {
    display: flex;
    align-items: center;
    gap: 0.3rem;
  }
  .jump-group input[type=number] {
    width: 55px;
    font-family: 'Source Serif 4', serif;
    font-size: 0.78rem;
    background: var(--bg);
    color: var(--text);
    border: 1px solid var(--border);
    border-radius: 3px;
    padding: 0.2rem 0.4rem;
    text-align: center;
  }
  .jump-group button {
    font-size: 0.75rem;
    padding: 0.22rem 0.5rem;
    border: 1px solid var(--border);
    background: var(--bg);
    color: var(--text);
    border-radius: 3px;
    cursor: pointer;
  }

  @media (max-width: 500px) {
    .reader-wrap { padding: 1rem 0.8rem 8rem; }
    .paragraph-box { padding: 1rem 1rem; font-size: 1rem; }
    .book-title-bar { font-size: 0.85rem; }
    .chapter-bar { display: none; }
  }
</style>
</head>
<body>

<div class="topbar">
  <a class="back-btn" href="/">← Библиотека</a>
  <div class="book-title-bar">{{ book.title }}</div>
  <div class="chapter-bar" id="chapter-display">—</div>
  <button class="theme-btn" onclick="toggleTheme()">🌙</button>
</div>

<div class="progress-track">
  <div class="progress-fill" id="progress-fill" style="width:0%"></div>
</div>

<div class="reader-wrap">
  <div class="para-meta">
    <span class="status-dot" id="status-dot"></span>
    <span id="para-counter">Параграф — от {{ book.total_paragraphs }}</span>
  </div>

  <div class="paragraph-box" id="para-box">
    <em style="color:var(--text2)">Зареждане...</em>
  </div>

  <div class="next-preview" id="next-preview" style="display:none"></div>
</div>

<!-- Controls -->
<div class="controls-bar">
  <div class="controls-main">
    <button class="ctrl-btn" id="btn-prev" onclick="prevPara()" title="Предишен">⏮</button>
    <button class="ctrl-btn play-pause" id="btn-play" onclick="togglePlay()">▶</button>
    <button class="ctrl-btn" id="btn-next" onclick="nextPara()" title="Следващ">⏭</button>
  </div>
  <div class="controls-settings">
    <div class="setting-group">
      <label>Скорост:</label>
      <input type="range" id="speed-slider" min="0.5" max="2.0" step="0.1" value="1.0"
             oninput="updateSpeed(this.value)">
      <span class="speed-val" id="speed-val">1.0×</span>
    </div>
    <div class="setting-group font-btns">
      <label>Шрифт:</label>
      <button onclick="changeFontSize(-1)">A−</button>
      <button onclick="changeFontSize(1)">A+</button>
    </div>
    <div class="setting-group jump-group">
      <label>Параграф:</label>
      <input type="number" id="jump-input" min="1" value="1">
      <button onclick="jumpTo()">→</button>
    </div>
  </div>
</div>

<script>
// State
const BOOK_ID = {{ book.id }};
const TOTAL = {{ book.total_paragraphs }};
let currentIdx = {{ start_para }};
let isPlaying = false;
let currentAudio = null;
let prefetchedAudio = null;
let prefetchedIdx = -1;
let speed = parseFloat(localStorage.getItem('bw-speed') || '1.0');
let fontSize = parseFloat(localStorage.getItem('bw-fontsize') || '1.1');
let autoAdvance = true;
let currentText = '';

// Theme
const savedTheme = localStorage.getItem('bw-theme') || 'light';
if (savedTheme === 'dark') document.documentElement.setAttribute('data-theme', 'dark');
function toggleTheme() {
  const d = document.documentElement;
  const next = d.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
  d.setAttribute('data-theme', next);
  localStorage.setItem('bw-theme', next);
}

// Font size
document.documentElement.style.setProperty('--font-size', fontSize + 'rem');
document.getElementById('speed-slider').value = speed;
document.getElementById('speed-val').textContent = speed.toFixed(1) + '×';

function changeFontSize(delta) {
  fontSize = Math.min(2.0, Math.max(0.8, fontSize + delta * 0.1));
  document.documentElement.style.setProperty('--font-size', fontSize.toFixed(1) + 'rem');
  localStorage.setItem('bw-fontsize', fontSize.toFixed(1));
}

function updateSpeed(val) {
  speed = parseFloat(val);
  localStorage.setItem('bw-speed', speed.toFixed(1));
  document.getElementById('speed-val').textContent = speed.toFixed(1) + '×';
  // If currently playing, restart current paragraph at new speed
  if (isPlaying) {
    stopAudio();
    speakCurrent();
  }
}

// UI helpers
function setStatus(state) {
  const dot = document.getElementById('status-dot');
  dot.className = 'status-dot ' + (state || '');
}

function updateUI() {
  document.getElementById('para-counter').textContent =
    `Параграф ${currentIdx + 1} от ${TOTAL}`;
  document.getElementById('jump-input').value = currentIdx + 1;
  const pct = TOTAL > 0 ? ((currentIdx + 1) / TOTAL * 100).toFixed(1) : 0;
  document.getElementById('progress-fill').style.width = pct + '%';
  document.getElementById('btn-prev').disabled = currentIdx <= 0;
  document.getElementById('btn-next').disabled = currentIdx >= TOTAL - 1;
}

function setPlayBtn(playing) {
  document.getElementById('btn-play').textContent = playing ? '⏸' : '▶';
}

// Paragraph fetching
const paraCache = {};

async function fetchPara(idx) {
  if (paraCache[idx]) return paraCache[idx];
  const r = await fetch(`/read/${BOOK_ID}/paragraph/${idx}`);
  if (!r.ok) return null;
  const data = await r.json();
  paraCache[idx] = data;
  return data;
}

async function displayPara(data) {
  if (!data) return;
  document.getElementById('para-box').textContent = data.text;
  document.getElementById('para-box').classList.remove('loading');
  document.getElementById('chapter-display').textContent = data.chapter || '—';
  currentText = data.text;

  // Show next preview
  const nextData = await fetchPara(currentIdx + 1);
  const preview = document.getElementById('next-preview');
  if (nextData) {
    preview.textContent = nextData.text;
    preview.style.display = 'block';
  } else {
    preview.style.display = 'none';
  }
  updateUI();
}

// Audio
function buildTTSUrl(text, spd) {
  return `/tts/speak?text=${encodeURIComponent(text)}&speed=${spd.toFixed(1)}`;
}

function stopAudio() {
  if (currentAudio) {
    currentAudio.pause();
    currentAudio.src = '';
    currentAudio = null;
  }
}

async function prefetchAudio(idx, spd) {
  if (idx >= TOTAL || idx < 0) return;
  const data = await fetchPara(idx);
  if (!data) return;
  const audio = new Audio(buildTTSUrl(data.text, spd));
  audio.preload = 'auto';
  prefetchedAudio = audio;
  prefetchedIdx = idx;
}

function speakCurrent() {
  setStatus('loading');
  stopAudio();

  let audio;
  if (prefetchedIdx === currentIdx && prefetchedAudio) {
    audio = prefetchedAudio;
    prefetchedAudio = null;
    prefetchedIdx = -1;
  } else {
    audio = new Audio(buildTTSUrl(currentText, speed));
  }

  currentAudio = audio;

  audio.oncanplay = () => setStatus('playing');

  audio.onended = () => {
    setStatus('');
    // Save progress
    saveProgress(currentIdx);
    // Pre-fetch next+1
    prefetchAudio(currentIdx + 1, speed);
    if (autoAdvance && currentIdx < TOTAL - 1) {
      currentIdx++;
      loadAndPlay(currentIdx);
    } else {
      isPlaying = false;
      setPlayBtn(false);
    }
  };

  audio.onerror = () => {
    setStatus('');
    console.error('Audio error');
    isPlaying = false;
    setPlayBtn(false);
  };

  audio.play();
  // Pre-fetch next paragraph audio
  prefetchAudio(currentIdx + 1, speed);
}

async function loadAndPlay(idx) {
  document.getElementById('para-box').classList.add('loading');
  const data = await fetchPara(idx);
  if (!data) return;
  await displayPara(data);
  speakCurrent();
}

async function loadPara(idx) {
  document.getElementById('para-box').classList.add('loading');
  const data = await fetchPara(idx);
  if (data) await displayPara(data);
}

// Controls
async function togglePlay() {
  if (isPlaying) {
    isPlaying = false;
    setPlayBtn(false);
    setStatus('');
    if (currentAudio) currentAudio.pause();
  } else {
    isPlaying = true;
    setPlayBtn(true);
    if (currentAudio && currentAudio.src && currentAudio.paused && currentAudio.readyState >= 2) {
      currentAudio.play();
      setStatus('playing');
    } else {
      await loadAndPlay(currentIdx);
    }
  }
}

async function prevPara() {
  stopAudio();
  if (isPlaying) {
    isPlaying = false;
    setPlayBtn(false);
    setStatus('');
  }
  if (currentIdx > 0) {
    currentIdx--;
    await loadPara(currentIdx);
    saveProgress(currentIdx);
  }
}

async function nextPara() {
  stopAudio();
  const wasPlaying = isPlaying;
  isPlaying = false;
  setPlayBtn(false);
  setStatus('');
  if (currentIdx < TOTAL - 1) {
    currentIdx++;
    await loadPara(currentIdx);
    saveProgress(currentIdx);
    if (wasPlaying) {
      isPlaying = true;
      setPlayBtn(true);
      speakCurrent();
    }
  }
}

async function jumpTo() {
  const val = parseInt(document.getElementById('jump-input').value) - 1;
  if (isNaN(val) || val < 0 || val >= TOTAL) return;
  stopAudio();
  const wasPlaying = isPlaying;
  isPlaying = false;
  setPlayBtn(false);
  setStatus('');
  currentIdx = val;
  await loadPara(currentIdx);
  saveProgress(currentIdx);
  if (wasPlaying) {
    isPlaying = true;
    setPlayBtn(true);
    speakCurrent();
  }
}

// Progress
async function saveProgress(idx) {
  await fetch(`/read/${BOOK_ID}/progress/${idx}`, { method: 'POST' });
}

// Keyboard
document.addEventListener('keydown', e => {
  if (e.target.tagName === 'INPUT') return;
  if (e.code === 'Space') { e.preventDefault(); togglePlay(); }
  if (e.code === 'ArrowRight') nextPara();
  if (e.code === 'ArrowLeft') prevPara();
});

// Init
(async () => {
  await loadPara(currentIdx);
  updateUI();
  // Pre-fetch audio for first paragraph
  prefetchAudio(currentIdx, speed);
})();
</script>
</body>
</html>
